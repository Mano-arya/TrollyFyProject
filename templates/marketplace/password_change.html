{% extends 'base.html' %}

{% block title %}Change Password | Trollyfy{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-danger text-white text-center py-4">
                <i class="bi bi-key-fill display-6"></i>
                <h4 class="fw-bold mb-0">Security Gate</h4>
                <p class="small opacity-75 mb-0">Update your access credentials</p>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold small">{{ field.label }}</label>
                            <div class="position-relative">
                                {{ field }}
                                <button type="button" class="btn border-0 position-absolute end-0 top-50 translate-middle-y me-2 toggle-password" style="z-index: 10;">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            {% if field.errors %}
                                <div class="text-danger small mt-1">
                                    {{ field.errors|first }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-danger btn-lg rounded-pill fw-bold">Update Password</button>
                        <a href="{% url 'profile' %}" class="btn btn-link text-muted text-decoration-none small">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('.toggle-password').forEach(btn => {
        btn.addEventListener('click', function() {
            const input = this.previousElementSibling;
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
    });
</script>


<style>
    .card-body input {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        border: 1px solid #dee2e6;
        outline: none;
    }
    .card-body input:focus {
        border-color: #dc3545;
        box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.1);
    }
</style>
{% endblock %}
