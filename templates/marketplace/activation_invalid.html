{% extends 'base.html' %}

{% block title %}Link Invalid | Trollyfy{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-7 col-lg-6 text-center">
        <div class="card shadow-sm border-0 rounded-4 p-5">
            <div class="mb-4">
                <span class="display-1 text-danger">❌</span>
            </div>
            <h2 class="fw-bold mb-3">Invalid Link</h2>
            <p class="text-muted lead mb-4">
                The activation link you clicked is invalid, expired, or has already been used.
            </p>
            <div class="d-grid gap-2 col-md-8 mx-auto">
                <a href="{% url 'signup' %}" class="btn btn-primary rounded-pill px-4">Register Again</a>
                <a href="{% url 'login' %}" class="btn btn-light rounded-pill px-4">Go to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
