{% extends 'base.html' %}

{% block title %}Delete Listing | Trollyfy{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4 text-center p-4 p-md-5">
            <div class="mb-4">
                <span class="display-1 text-danger">⚠️</span>
            </div>
            <h3 class="fw-bold text-dark mb-3">Are you sure?</h3>
            <p class="text-muted mb-4">
                You are about to delete <span class="fw-bold text-dark">"{{ object.title }}"</span>. 
                This action is permanent and cannot be undone.
            </p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger btn-lg rounded-pill fw-bold">Yes, Delete Item</button>
                    <a href="{% url 'profile' %}" class="btn btn-light btn-lg rounded-pill fw-bold">Cancel, Keep it</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
