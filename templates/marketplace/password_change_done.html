{% extends 'base.html' %}

{% block title %}Password Updated | Trollyfy{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-4 text-center">
        <div class="card shadow-sm border-0 rounded-4 p-5">
            <div class="mb-4">
                <i class="bi bi-shield-check-fill text-success display-1"></i>
            </div>
            <h3 class="fw-bold mb-3">Security Updated!</h3>
            <p class="text-muted mb-4">Your password has been changed successfully. You can now use your new credentials for future logins.</p>
            <div class="d-grid">
                <a href="{% url 'profile' %}" class="btn btn-primary btn-lg rounded-pill fw-bold">Return to Profile</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
