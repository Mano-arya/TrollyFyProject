{% extends "admin/login.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'css/admin_custom.css' %}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
    /* ── Login Card ── */
    #container {
        box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        border-radius: 12px;
        overflow: hidden;
        margin-top: 50px;
        max-width: 480px;
        border: none;
    }

    /* ── FIX #5: Center the Log In button ── */
    #login-form .submit-row {
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        padding: 0 0 1rem 0 !important;
        background: transparent !important;
        border: none !important;
        overflow: visible !important;
    }

    #login-form .submit-row input[type="submit"] {
        width: 100% !important;
        max-width: 360px !important;
        padding: 12px 0 !important;
        font-size: 1rem !important;
        font-weight: 700 !important;
        border-radius: 8px !important;
        letter-spacing: 0.03em;
        cursor: pointer;
    }

    /* ── FIX #4 (login page): Eye icon alignment ── */
    .form-row {
        position: relative;
    }

    /* Eye icon: perfectly centered vertically within the input,
       offset by ~half the label height (≈14px) */
    .password-toggle {
        position: absolute;
        right: 14px;
        bottom: 10px;        /* Anchored to bottom of input, not top of form-row */
        cursor: pointer;
        color: #7c7c7c;
        z-index: 10;
        font-size: 1rem;
        line-height: 1;
        transition: color 0.2s;
    }
    .password-toggle:hover {
        color: #2563eb;
    }

    /* Pad input so text never hides under icon */
    .form-row input[type="password"],
    .form-row input[type="text"] {
        padding-right: 44px !important;
    }

    /* Shared input styles */
    input[type="text"],
    input[type="password"] {
        border-radius: 8px !important;
        padding: 10px 12px !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }
</style>
{% endblock %}

{% block content %}
{{ block.super }}
<script>
    document.addEventListener('DOMContentLoaded', function () {

        /* ── Eye Icon Toggle (password field) ── */
        const passwordField = document.querySelector('input[type="password"]');
        if (passwordField) {
            const toggleIcon = document.createElement('i');
            toggleIcon.className = 'bi bi-eye-slash password-toggle';
            toggleIcon.setAttribute('title', 'Show/Hide password');
            // Append to the form-row wrapper (parent of the input)
            passwordField.parentElement.style.position = 'relative';
            passwordField.parentElement.appendChild(toggleIcon);

            toggleIcon.addEventListener('click', function () {
                if (passwordField.type === 'password') {
                    passwordField.type = 'text';
                    toggleIcon.className = 'bi bi-eye password-toggle';
                } else {
                    passwordField.type = 'password';
                    toggleIcon.className = 'bi bi-eye-slash password-toggle';
                }
            });
        }

    });
</script>
{% endblock %}
